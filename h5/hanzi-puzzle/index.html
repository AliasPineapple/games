<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>汉字偏旁消消乐</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
    body{background:linear-gradient(160deg,#EFF6FF 0%,#DBEAFE 100%);}

    /* ══ 关卡选择 ══ */
    #screen-menu{
      position:fixed;inset:0;
      background:linear-gradient(160deg,#EFF6FF,#BFDBFE);
      display:flex;flex-direction:column;align-items:center;
      z-index:200;padding:20px 16px 12px;overflow-y:auto;
    }
    .menu-logo{font-size:40px;margin-bottom:2px}
    .menu-title{font-size:22px;font-weight:800;color:#1D4ED8;margin-bottom:2px}
    .menu-sub{font-size:12px;color:#93C5FD;margin-bottom:16px}
    .level-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:10px;width:100%;max-width:360px;
    }
    .level-btn{
      background:#fff;border:2px solid #BFDBFE;border-radius:14px;
      padding:10px 4px;text-align:center;cursor:pointer;
      box-shadow:0 2px 8px rgba(29,78,216,.08);
      transition:transform .12s;
    }
    .level-btn:active{transform:scale(.92)}
    .lnum{font-size:10px;font-weight:700;color:#3B82F6;margin-bottom:1px}
    .lrad{font-size:28px;line-height:1.2}
    .lname{font-size:9px;color:#94A3B8;margin-top:1px}
    .ldiff{font-size:9px;color:#CBD5E1;margin-top:2px}
    .lstars{font-size:12px;min-height:14px;color:#F59E0B;margin-top:3px}

    /* ══ 游戏主界面 ══ */
    #screen-game{
      position:fixed;inset:0;display:none;flex-direction:column;
      background:linear-gradient(160deg,#EFF6FF 0%,#DBEAFE 100%);
    }
    #screen-game.active{display:flex}

    /* 顶栏 40px */
    #header{
      height:40px;flex-shrink:0;padding:0 12px;
      display:flex;align-items:center;justify-content:space-between;
    }
    #btn-back{
      background:#fff;border:1.5px solid #BFDBFE;border-radius:10px;
      padding:4px 12px;font-size:13px;color:#3B82F6;cursor:pointer;font-weight:600;
    }
    #btn-back:active{transform:scale(.92)}
    #level-label{font-size:13px;font-weight:700;color:#1D4ED8}

    /* 信息栏：居中布局 */
    #info-bar{
      flex-shrink:0;padding:6px 12px 4px;
      display:flex;flex-direction:column;align-items:center;gap:5px;
    }
    #info-top{display:flex;align-items:center;gap:10px;justify-content:center}
    #radical-badge{
      width:44px;height:44px;border-radius:13px;flex-shrink:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-weight:800;box-shadow:0 3px 10px rgba(0,0,0,.15);
      border:2px solid rgba(255,255,255,.4);
    }
    #radical-char{font-size:20px;line-height:1;color:#fff}
    #radical-name{font-size:7px;opacity:.8;color:#fff;margin-top:1px}
    #found-label{font-size:14px;font-weight:800;color:#1D4ED8;text-align:center}
    /* 结果格子行：居中 */
    #result-row{
      display:flex;gap:4px;flex-wrap:wrap;
      justify-content:center;
    }
    .result-slot{
      width:28px;height:28px;border-radius:8px;flex-shrink:0;
      background:rgba(255,255,255,.45);border:1.5px dashed #93C5FD;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:700;color:#1D4ED8;
    }
    .result-slot.filled{
      background:#fff;border-style:solid;border-color:#3B82F6;
      box-shadow:0 2px 5px rgba(59,130,246,.2);
    }
    .result-slot.pop{animation:slotPop .28s ease-out}
    @keyframes slotPop{0%{transform:scale(1.5)}100%{transform:scale(1)}}

    /* 计时条 18px */
    #timer-wrap{
      height:18px;flex-shrink:0;padding:0 12px;
      display:flex;align-items:center;gap:8px;
    }
    #timer-bar-bg{
      flex:1;height:8px;background:rgba(255,255,255,.4);
      border-radius:4px;overflow:hidden;
    }
    #timer-bar{
      height:100%;background:#3B82F6;border-radius:4px;
      transition:width .95s linear,background .4s;width:100%;
    }
    #timer-text{font-size:11px;color:#64748B;flex-shrink:0;min-width:32px;text-align:right}

    /* 棋盘区域：剩余全部空间 */
    #board-wrap{
      flex:1;min-height:0;
      display:flex;align-items:center;justify-content:center;
      padding:6px 8px;overflow:hidden;
    }
    /* 棋盘：CSS Grid，宽高由JS动态设置 */
    #board{
      display:grid;
      gap:3px;
      padding:6px;
      background:rgba(255,255,255,.22);
      border:2px solid rgba(147,197,253,.6);
      border-radius:16px;
      flex-shrink:0;
    }

    /* ── 方块 ── */
    .cell{
      border-radius:8px;
      background:#fff;
      border:1.5px solid #BFDBFE;
      box-shadow:0 2px 5px rgba(0,0,0,.07);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:#1E293B;
      cursor:pointer;
      touch-action:manipulation;
      /* 掉落动画 */
      transition:transform .18s cubic-bezier(.34,1.56,.64,1),
                 opacity .15s;
    }
    .cell:active:not(.cell-wrong-lock){transform:scale(.82)}
    /* 正确消除：原地变灰淡出，保留占位 */
    .cell-used{
      pointer-events:none;
      background:#F1F5F9 !important;
      border-color:#E2E8F0 !important;
      color:#CBD5E1 !important;
      box-shadow:none !important;
      animation:cellUsed .25s ease-out forwards;
    }
    @keyframes cellUsed{
      0%  {transform:scale(1.15);opacity:1}
      100%{transform:scale(1);opacity:0.22}
    }
    /* 错误：红色抖动，结束后恢复 */
    .cell-wrong{
      animation:cellWrong .34s ease-out;
      background:#FEE2E2!important;
      border-color:#EF4444!important;
      color:#DC2626!important;
    }
    .cell-wrong-lock{pointer-events:none}
    @keyframes cellWrong{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
    /* 空格 */
    .cell-empty{
      background:rgba(219,234,254,.25);
      border:1.5px dashed rgba(147,197,253,.3);
      pointer-events:none;
      box-shadow:none;
    }
    /* 入场动画（从上方滑入） */
    @keyframes cellFall{
      from{transform:translateY(-24px);opacity:0}
      to{transform:translateY(0);opacity:1}
    }
    .cell-fall{animation:cellFall .28s cubic-bezier(.22,.61,.36,1) both}

    /* ══ 通关/失败遮罩 ══ */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.48);
      display:flex;align-items:center;justify-content:center;
      z-index:100;opacity:0;pointer-events:none;transition:opacity .22s;
    }
    .overlay.show{opacity:1;pointer-events:all}
    .overlay-box{
      background:#fff;border-radius:22px;padding:22px 24px;
      text-align:center;width:86%;max-width:310px;
      box-shadow:0 16px 48px rgba(0,0,0,.2);
      transform:scale(.82) translateY(16px);
      transition:transform .28s cubic-bezier(.34,1.56,.64,1);
    }
    .overlay.show .overlay-box{transform:scale(1) translateY(0)}
    .ov-emoji{font-size:42px;margin-bottom:4px}
    .ov-title{font-size:24px;font-weight:800;margin-bottom:6px}
    .ov-sub{font-size:12px;color:#64748B;margin-bottom:10px;line-height:1.6}
    .star-row{font-size:34px;margin-bottom:12px;letter-spacing:5px}
    .fail-answers{
      margin-bottom:10px;font-size:12px;color:#475569;line-height:2;
      text-align:left;max-height:180px;overflow-y:auto;
      background:#F8FAFC;border-radius:10px;padding:6px 10px;
      white-space:pre-line;
    }
    .ov-btns{display:flex;gap:8px;justify-content:center}
    .ov-btn{
      padding:9px 18px;border-radius:11px;font-size:14px;font-weight:700;
      cursor:pointer;border:none;transition:transform .1s;
    }
    .ov-btn:active{transform:scale(.91)}
    .ov-btn.primary{background:#3B82F6;color:#fff;box-shadow:0 3px 10px rgba(59,130,246,.3)}
    .ov-btn.secondary{background:#E2E8F0;color:#475569}
  </style>
</head>
<body>

<!-- ══ 关卡选择 ══ -->
<div id="screen-menu">
  <div class="menu-logo">🀄</div>
  <div class="menu-title">汉字偏旁消消乐</div>
  <div class="menu-sub">找出能与目标偏旁组成汉字的方块，点击消除</div>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- ══ 游戏主界面 ══ -->
<div id="screen-game">
  <div id="header">
    <button id="btn-back">← 返回</button>

    <span style="width:52px"></span>
  </div>

  <div id="info-bar">
    <div id="info-top">
      <div id="radical-badge">

        <span id="radical-name">水字旁</span>
      </div>
      <div id="found-label">已找到 0 / 5</div>
    </div>
    <div id="result-row"></div>
  </div>

  <div id="timer-wrap">
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
    <div id="timer-text">02:00</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<!-- ══ 通关遮罩 ══ -->
<div class="overlay" id="overlay-win">
  <div class="overlay-box">
    <div class="ov-emoji">🎉</div>
    <div class="ov-title" style="color:#F59E0B">通　关！</div>
    <div class="star-row" id="win-stars"></div>
    <div class="ov-sub" id="win-sub"></div>
    <div class="ov-btns">
      <button class="ov-btn secondary" id="btn-win-menu">关卡选择</button>
      <button class="ov-btn primary"   id="btn-win-next">下一关 →</button>
    </div>
  </div>
</div>

<!-- ══ 失败遮罩 ══ -->
<div class="overlay" id="overlay-fail">
  <div class="overlay-box">
    <div class="ov-emoji">⏰</div>
    <div class="ov-title" style="color:#EF4444">时间到！</div>
    <div class="ov-sub" id="fail-sub"></div>
    <div class="fail-answers" id="fail-answers"></div>
    <div class="ov-btns">
      <button class="ov-btn secondary" id="btn-fail-menu">关卡选择</button>
      <button class="ov-btn primary"   id="btn-fail-retry">再来一次</button>
    </div>
  </div>
</div>

// 用途：生成干扰项时，排除掉 CHAR_DB[字根][本关偏旁] 存在的字根
const CHAR_DB = (() => {
  const db = {};
  for (const [radical, entries] of Object.entries(RADICAL_DB)) {
    for (const [root, hanzi] of Object.entries(entries)) {
      if (!db[root]) db[root] = {};
      db[root][radical] = hanzi;
    }
  }
  return db;
})();

let _ctx=null;
function getCtx(){
  if(!_ctx) _ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(_ctx.state==="suspended") _ctx.resume();
  return _ctx;
}
function tone(f1,f2,dur,type="sine",vol=0.2){
  try{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.type=type; o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(f1,c.currentTime);
    if(f2!==f1) o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur+0.04);
    o.start(c.currentTime); o.stop(c.currentTime+dur+0.06);
  }catch(e){}
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════════════════
// 【8】构建 pool：随机抽取部分正确字根 + 安全干扰项补满格子
//
// 每关展示的正确答案数 = min(TARGET_CORRECT, 字库中该偏旁总字根数)
// TARGET_CORRECT: 每关固定需要找到的正确字根数（当前设为5）
//
// 干扰项策略：
//   候选池 = 所有偏旁下出现过的字根（全局，去重）
//   过滤条件：CHAR_DB[字根][本关偏旁] 不存在 → 安全
// ══════════════════════════════════════════════════════
const TARGET_CORRECT = 5;  // 每关需要找到的正确答案数

function buildPool(radical, totalCells){
  const allCorrect = Object.keys(RADICAL_DB[radical]);

  // 随机抽取 TARGET_CORRECT 个正确字根（不超过字库总数）
  const pickCount = Math.min(TARGET_CORRECT, allCorrect.length, totalCells - 1);
  const correct   = shuffle([...allCorrect]).slice(0, pickCount);

  // 全局字根候选池（排除本关偏旁）
  const allRoots = new Set();
  for(const [rad, entries] of Object.entries(RADICAL_DB)){
    if(rad === radical) continue;
    for(const root of Object.keys(entries)) allRoots.add(root);
  }

  // 过滤：排除能与本关偏旁组字的字根
  const safeWrong = [...allRoots].filter(root => {
    const mapping = CHAR_DB[root];
    return !mapping || !(radical in mapping);
  });

  // 全部正确字根放进pool
  const pool = [...correct];

  // 随机补满干扰项
  const need   = totalCells - pool.length;
  const picked = shuffle([...safeWrong]).slice(0, need);
  pool.push(...picked);

  // 极端情况兜底
  let idx = 0;
  const shuffledWrong = shuffle([...safeWrong]);
  while(pool.length < totalCells){
    pool.push(shuffledWrong[idx % Math.max(shuffledWrong.length, 1)]);
    idx++;
  }

  return shuffle(pool.slice(0, totalCells));
}

function startLevel(idx){
  clearInterval(timerIv);

  curLevelIdx = idx;
  curLevel    = LEVELS[idx];
  curLevel.target = Math.min(TARGET_CORRECT, Object.keys(RADICAL_DB[curLevel.radical]).length); // 动态读取答案数
  foundCount  = 0;
  errorCount  = 0;
  gameOver    = false;
  resultSlots = [];
  COLS        = curLevel.cols;
  ROWS        = curLevel.cols; // 正方形网格

  document.getElementById("screen-menu").style.display = "none";
  document.getElementById("screen-game").classList.add("active");

  // 配色
  const s = RADICAL_STYLE[curLevel.radical];
  document.getElementById("radical-badge").style.background = s.bg;
  document.getElementById("timer-bar").style.background     = s.bg;
  document.getElementById("level-label").textContent        = `第 ${curLevel.id} 关 · ${diffLabel(curLevel.cols)}`;
  document.getElementById("radical-char").textContent       = curLevel.radical;
  document.getElementById("radical-name").textContent       = curLevel.radName;

  // 结果格子
  const rr = document.getElementById("result-row");
  rr.innerHTML = "";
  for(let i=0;i<curLevel.target;i++){
    const sl = document.createElement("div");
    sl.className = "result-slot";
    rr.appendChild(sl);
    resultSlots.push(sl);
  }
  updateFoundLabel();

  // 计时
  timeLeft = totalTime = curLevel.time;
  updateTimerBar();

  // 等两帧确保布局稳定，再构建棋盘
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    buildBoard();
    startTimer();
  }));
}

// ══════════════════════════════════════════════════════
// 【10】构建棋盘（CSS Grid，填满所有格子）
// ══════════════════════════════════════════════════════
function buildBoard(){
  const boardEl  = document.getElementById("board");
  const wrapEl   = document.getElementById("board-wrap");
  boardEl.innerHTML = "";
  grid = [];

  // 计算单格尺寸：让整个 board 恰好填满 board-wrap 可用区域
  const availW = wrapEl.clientWidth  - 16;  // 减去 padding 8*2
  const availH = wrapEl.clientHeight - 12;
  const gapPx  = 3;   // gap
  const padPx  = 6;   // board padding（上下各6）
  // 单格宽 = (可用宽 - 2*pad - (COLS-1)*gap) / COLS
  const cellW = Math.floor((availW - 2*padPx - (COLS-1)*gapPx) / COLS);
  const cellH = Math.floor((availH - 2*padPx - (ROWS-1)*gapPx) / ROWS);
  CELL_SIZE   = Math.max(24, Math.min(cellW, cellH, 58)); // 24~58px

  // 字号随格子大小缩放
  const fontSize = CELL_SIZE >= 44 ? 20
                 : CELL_SIZE >= 34 ? 16
                 : CELL_SIZE >= 28 ? 13
                 : 11;

  // 设置 CSS Grid
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, ${CELL_SIZE}px)`;
  boardEl.style.gridTemplateRows    = `repeat(${ROWS}, ${CELL_SIZE}px)`;

  // 生成 pool
  const pool = buildPool(curLevel.radical, COLS * ROWS);

  // 初始化 grid 数组（[row][col]）
  for(let r=0;r<ROWS;r++){
    grid[r] = [];
    for(let c=0;c<COLS;c++){
      const radical   = pool[r * COLS + c];
      const isCorrect = radical in RADICAL_DB[curLevel.radical];

      const el = document.createElement("div");
      el.className  = "cell cell-fall";
      el.textContent= radical;
      el.style.width = el.style.height = CELL_SIZE + "px";
      el.style.fontSize = fontSize + "px";
      // 入场动画延迟（按行错开，视觉更丰富）
      el.style.animationDelay = (r * 0.03 + c * 0.008) + "s";

      const row=r, col=c;
      el.addEventListener("click", e=>{ e.stopPropagation(); handleClick(row, col); });

      boardEl.appendChild(el);

      grid[r][c] = { radical, isCorrect, el };
    }
  }

  // 初始化所有格子的 grid-row/grid-column 坐标
  // 这样 dropColumn 重新定位时坐标系一致
  initGridPositions();
}

// ══════════════════════════════════════════════════════
// 【11】点击处理
// ══════════════════════════════════════════════════════
function handleClick(row, col){
  const cell = grid[row]?.[col];
  if(!cell || !cell.el || gameOver) return;
  // 已消除或正在抖动中则忽略
  if(cell.removed || cell.el.classList.contains("cell-wrong-lock")) return;

  if(cell.isCorrect){
    doCorrect(row, col);
  } else {
    doWrong(row, col);
  }
}

// ── 正确消除 ──
function doCorrect(row, col){
  sfxOK();
  const cell = grid[row][col];
  const hanzi = RADICAL_DB[curLevel.radical][cell.radical];

  // 标记为已用，不可再点
  cell.removed = true;
  cell.el.classList.remove("cell-wrong","cell-wrong-lock");
  cell.el.classList.add("cell-used");

  // 填入结果格（立即，不需要等动画）
  const slot = resultSlots[foundCount];
  if(slot){
    slot.textContent = hanzi;
    slot.classList.add("filled");
    void slot.offsetWidth;
    slot.classList.add("pop");
    setTimeout(()=>slot.classList.remove("pop"), 320);
  }
  foundCount++;
  updateFoundLabel();

  if(foundCount >= curLevel.target){
    setTimeout(triggerWin, 350);
  }
}

// ── 掉落：消除 (row,col) 后，该列第 0..row-1 行的方块依次下移 ──
function dropColumn(col){
  const boardEl = document.getElementById("board");

  // 从消除行往上，把方块重新分配到下方空格
  // 方法：收集该列所有非空格（从上到下），重新分配到底部对齐
  const cells = [];
  for(let r=0; r<ROWS; r++){
    if(grid[r][col]) cells.push(grid[r][col]);
  }

  // 清空该列
  for(let r=0; r<ROWS; r++) grid[r][col] = null;

  // 从底部往上填充（底部先放）
  for(let i=0; i<cells.length; i++){
    const r = ROWS - cells.length + i;
    grid[r][col] = cells[i];
  }

  // 重新设置所有单元格的 DOM grid 位置
  // CSS Grid 用 grid-row / grid-column 精确定位
  for(let r=0; r<ROWS; r++){
    const cell = grid[r][col];
    if(cell){
      cell.el.style.gridRow    = (r+1) + "";
      cell.el.style.gridColumn = (col+1) + "";
      // 如果不在 board 里，重新插入
      if(!cell.el.parentNode || cell.el.parentNode !== boardEl){
        boardEl.appendChild(cell.el);
      }

    }
  }

  // 顶部空格：渲染空占位（维持网格结构）
  renderEmptyCells();
}

// 渲染所有空格占位（保持 Grid 结构稳定）
function renderEmptyCells(){
  const boardEl = document.getElementById("board");
  // 先移除旧的空格占位
  boardEl.querySelectorAll(".cell-empty").forEach(e=>e.remove());

  for(let r=0; r<ROWS; r++){
    for(let c=0; c<COLS; c++){
      if(!grid[r][c]){
        const ph = document.createElement("div");
        ph.className = "cell cell-empty";
        ph.style.width  = ph.style.height = CELL_SIZE + "px";
        ph.style.gridRow    = (r+1) + "";
        ph.style.gridColumn = (c+1) + "";
        boardEl.appendChild(ph);
      }
    }
  }
}

// 初始布局用 grid-area 定位（不用 grid-row/column，让 DOM 顺序即为布局）
// 但掉落后需要重新定位，所以初始化时也给所有格子设置 grid 坐标
function initGridPositions(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        grid[r][c].el.style.gridRow    = (r+1) + "";
        grid[r][c].el.style.gridColumn = (c+1) + "";
      }
    }
  }
}

// ── 错误抖动 ──
function doWrong(row, col){
  sfxBad();
  errorCount++;
  timeLeft = Math.max(0, timeLeft - 5);

  const bar = document.getElementById("timer-bar");
  bar.style.transition = "none";
  bar.style.background = "#EF4444";
  setTimeout(()=>{ bar.style.transition=""; updateTimerBar(); }, 420);

  const cell = grid[row][col];
  cell.el.classList.add("cell-wrong", "cell-wrong-lock");
  setTimeout(()=>{
    cell.el.classList.remove("cell-wrong", "cell-wrong-lock");
  }, 370);
}

function updateFoundLabel(){
  document.getElementById("found-label").textContent =
    `已找到 ${foundCount} / ${curLevel.target}`;
}

// ══════════════════════════════════════════════════════
// 【12】计时器
// ══════════════════════════════════════════════════════
function startTimer(){
  clearInterval(timerIv);
  timerIv = setInterval(()=>{
    if(gameOver){ clearInterval(timerIv); return; }
    timeLeft--;
    if(timeLeft<=15 && timeLeft>0) sfxTick();
    updateTimerBar();
    if(timeLeft<=0){ clearInterval(timerIv); triggerFail(); }
  }, 1000);
}

function updateTimerBar(){
  const pct = Math.max(0, timeLeft/totalTime)*100;
  const bar = document.getElementById("timer-bar");
  bar.style.width = pct + "%";
  const m = Math.floor(timeLeft/60);
  const s = timeLeft%60;
  document.getElementById("timer-text").textContent =
    `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

  const st = RADICAL_STYLE[curLevel?.radical];
  if(timeLeft<=10)            bar.style.background="#EF4444";
  else if(timeLeft<=totalTime*0.35) bar.style.background="#F59E0B";
  else if(st)                 bar.style.background=st.bg;
}

// ══════════════════════════════════════════════════════
// 【13】通关/失败
// ══════════════════════════════════════════════════════
function calcStars(){
  if(errorCount===0 && timeLeft/totalTime>0.5) return 3;
  if(errorCount<=2  && timeLeft>0)             return 2;
  return 1;
}

function triggerWin(){
  if(gameOver) return;
  gameOver=true; clearInterval(timerIv); sfxWin();
  const stars=calcStars(); saveStars(curLevel.id,stars);
  document.getElementById("win-stars").textContent = "★".repeat(stars)+"☆".repeat(3-stars);
  document.getElementById("win-sub").textContent   = `错误 ${errorCount} 次，剩余 ${timeLeft} 秒`;
  document.getElementById("btn-win-next").style.display =
    curLevelIdx < LEVELS.length-1 ? "" : "none";
  showOverlay("overlay-win");
}

function triggerFail(){
  if(gameOver) return;
  gameOver=true; sfxFail();
  document.getElementById("fail-sub").textContent = `已找到 ${foundCount} / ${curLevel.target} 个`;

  // 找出哪些字根已被玩家找到（resultSlots 中已填入的汉字）
  const foundHanzi = new Set(
    resultSlots.filter(s=>s.classList.contains("filled")).map(s=>s.textContent)
  );

  // 全部正确答案，标记已找到(✅) / 未找到(❌)
  const allCorrect = Object.entries(RADICAL_DB[curLevel.radical]);

  const lines = allCorrect.map(([k,v])=>{
    const mark = foundHanzi.has(v) ? "✅" : "❌";
    return `${mark} ${curLevel.radical} + ${k} = ${v}`;
  });

  document.getElementById("fail-answers").textContent = lines.join("\n");
  showOverlay("overlay-fail");
}

function showOverlay(id){ document.getElementById(id).classList.add("show"); }
function hideOverlay(id){ document.getElementById(id).classList.remove("show"); }

// ══════════════════════════════════════════════════════
// 【14】导航
// ══════════════════════════════════════════════════════
function goMenu(){
  clearInterval(timerIv);
  hideOverlay("overlay-win"); hideOverlay("overlay-fail");
  document.getElementById("screen-game").classList.remove("active");
  document.getElementById("screen-menu").style.display="";
  renderMenu();
}

document.getElementById("btn-back").addEventListener("click", goMenu);
document.getElementById("btn-win-menu").addEventListener("click", goMenu);
document.getElementById("btn-fail-menu").addEventListener("click", goMenu);
document.getElementById("btn-win-next").addEventListener("click",()=>{
  hideOverlay("overlay-win"); startLevel(curLevelIdx+1);
});
document.getElementById("btn-fail-retry").addEventListener("click",()=>{
  hideOverlay("overlay-fail"); startLevel(curLevelIdx);
});

// ══════════════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════════════
renderMenu();
</script>
