<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>汉字拼图消消乐</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;user-select:none;
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
    body{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);}

    /* ── 关卡选择 ── */
    #screen-menu{
      position:fixed;inset:0;
      background:linear-gradient(135deg,#EFF6FF,#BFDBFE);
      display:flex;flex-direction:column;align-items:center;
      z-index:200;padding:20px 16px;overflow-y:auto;
    }
    #screen-menu h1{font-size:26px;font-weight:800;color:#1D4ED8;margin:12px 0 4px;text-align:center}
    #screen-menu .sub{font-size:13px;color:#93C5FD;margin-bottom:16px}
    .level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px}
    .level-btn{
      background:#fff;border:2px solid #BFDBFE;border-radius:14px;
      padding:12px 8px;text-align:center;cursor:pointer;
      transition:transform .15s,box-shadow .15s;
      box-shadow:0 2px 8px rgba(29,78,216,.08);
    }
    .level-btn:active{transform:scale(.94)}
    .level-btn .lnum{font-size:13px;font-weight:700;color:#3B82F6}
    .level-btn .lrad{font-size:28px;line-height:1.3}
    .level-btn .lname{font-size:11px;color:#94A3B8;margin-top:2px}
    .level-btn .stars{font-size:13px;min-height:18px;color:#F59E0B}

    /* ── 游戏主界面：固定高度列布局 ── */
    #screen-game{
      position:fixed;inset:0;
      display:none;flex-direction:column;
      background:linear-gradient(135deg,#EFF6FF,#DBEAFE);
    }
    #screen-game.active{display:flex}

    /* 顶栏：固定高度 44px */
    #header{
      height:44px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 14px;
    }
    #btn-back{
      background:#fff;border:1.5px solid #BFDBFE;border-radius:10px;
      padding:4px 12px;font-size:13px;color:#3B82F6;cursor:pointer;font-weight:600;
    }
    #btn-back:active{transform:scale(.94)}
    #level-label{font-size:14px;font-weight:700;color:#1D4ED8}

    /* 目标区：固定高度 72px */
    #target-area{
      height:72px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;gap:12px;
      padding:0 14px;
    }
    #target-block{
      width:56px;height:56px;border-radius:14px;flex-shrink:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.12);
      border:2px solid rgba(255,255,255,.5);
    }
    #target-char{font-size:26px;line-height:1}
    #target-name{font-size:9px;margin-top:1px;opacity:.75}
    #target-info{display:flex;flex-direction:column;gap:4px}
    #found-label{font-size:13px;color:#1D4ED8;font-weight:600}

    /* 结果格子行：固定高度 52px */
    #result-row{
      height:52px;flex-shrink:0;
      display:flex;gap:6px;padding:4px 14px;
      justify-content:flex-start;align-items:center;
    }
    .result-slot{
      width:40px;height:40px;border-radius:10px;
      background:rgba(255,255,255,.5);border:2px dashed #93C5FD;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:700;color:#1D4ED8;
    }
    .result-slot.filled{background:#fff;border-style:solid;border-color:#3B82F6}
    .result-slot.pop{animation:slotPop .3s ease-out}
    @keyframes slotPop{0%{transform:scale(1.4)}100%{transform:scale(1)}}

    /* 计时进度条：固定高度 28px */
    #timer-wrap{
      height:28px;flex-shrink:0;
      padding:0 14px;display:flex;flex-direction:column;justify-content:center;
    }
    #timer-bar-bg{
      height:8px;background:rgba(255,255,255,.4);border-radius:4px;overflow:hidden;
    }
    #timer-bar{height:100%;background:#3B82F6;border-radius:4px;
      transition:width .9s linear,background .5s;width:100%}
    #timer-text{font-size:10px;color:#64748B;text-align:right;margin-top:1px}

    /* 方块堆叠区：flex:1 占满剩余空间，内部用 flex 居中方框 */
    #board-wrap{
      flex:1;min-height:0;
      display:flex;align-items:flex-start;justify-content:center;
      padding:6px 8px;
      overflow:hidden;
    }
    /* board 固定尺寸由 JS 设置，居中显示，不撑满 */
    #board{
      position:relative;
      border:2.5px solid rgba(147,197,253,.7);
      border-radius:16px;
      background:rgba(255,255,255,.22);
      overflow:hidden;
      flex-shrink:0;
    }

    /* 方块 */
    .block{
      position:absolute;
      width:56px;height:56px;
      border-radius:12px;
      background:#fff;
      border:2px solid #BFDBFE;
      box-shadow:0 3px 8px rgba(0,0,0,.1);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;font-weight:800;color:#1E293B;
      cursor:pointer;
    }
    .block:active:not(.disabled){transform:scale(.9)}
    .block.disabled{opacity:.28;cursor:not-allowed;pointer-events:none;}

    /* 正确：飞走消失 */
    .block.anim-correct{
      animation:flyUp .38s ease-in forwards;
      pointer-events:none;
    }
    @keyframes flyUp{
      0%  {transform:scale(1.15);opacity:1}
      100%{transform:scale(.1) translateY(-90px);opacity:0}
    }

    /* 错误：抖动 */
    .block.anim-wrong{
      animation:shake .35s ease-out;
      background:#FEE2E2!important;
      border-color:#EF4444!important;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px) rotate(-2deg)}
      40%{transform:translateX(8px) rotate(2deg)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }

    /* 遮罩 */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .overlay.show{opacity:1;pointer-events:all}
    .overlay-box{
      background:#fff;border-radius:24px;padding:24px 28px;
      text-align:center;width:88%;max-width:320px;
      box-shadow:0 12px 40px rgba(0,0,0,.2);
      transform:scale(.85);transition:transform .3s;
    }
    .overlay.show .overlay-box{transform:scale(1)}
    .overlay-title{font-size:24px;font-weight:800;margin-bottom:6px}
    .overlay-sub{font-size:13px;color:#64748B;margin-bottom:10px}
    .star-row{font-size:34px;margin-bottom:12px;letter-spacing:4px}
    .fail-answers{
      margin-bottom:12px;font-size:13px;color:#475569;
      line-height:1.9;text-align:left;
      max-height:120px;overflow-y:auto;
    }
    .ov-btns{display:flex;gap:10px;justify-content:center}
    .ov-btn{
      padding:9px 22px;border-radius:12px;font-size:15px;font-weight:700;
      cursor:pointer;border:none;transition:transform .12s;
    }
    .ov-btn:active{transform:scale(.94)}
    .ov-btn.primary{background:#3B82F6;color:#fff}
    .ov-btn.secondary{background:#E2E8F0;color:#475569}
  </style>
</head>
<body>

<!-- 关卡选择 -->
<div id="screen-menu">
  <h1>汉字拼图消消乐</h1>
  <p class="sub">点击偏旁方块，组成汉字！</p>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- 游戏主界面 -->
<div id="screen-game">
  <div id="header">
    <button id="btn-back">返回</button>
    <span id="level-label">第 1-1 关</span>
    <span style="width:52px"></span>
  </div>

  <div id="target-area">
    <div id="target-block">
      <span id="target-char">氵</span>
      <span id="target-name">水字旁</span>
    </div>
    <div id="target-info">
      <div id="found-label">已找到 0 / 5</div>
      <div id="result-row"></div>
    </div>
  </div>

  <div id="timer-wrap">
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
    <div id="timer-text">01:30</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>
</div>

<!-- 通关遮罩 -->
<div class="overlay" id="overlay-win">
  <div class="overlay-box">
    <div class="overlay-title" style="color:#F59E0B">通关！</div>
    <div class="star-row" id="win-stars"></div>
    <div class="overlay-sub" id="win-sub"></div>
    <div class="ov-btns">
      <button class="ov-btn secondary" id="btn-win-menu">关卡选择</button>
      <button class="ov-btn primary"   id="btn-win-next">下一关</button>
    </div>
  </div>
</div>

<!-- 失败遮罩 -->
<div class="overlay" id="overlay-fail">
  <div class="overlay-box">
    <div class="overlay-title" style="color:#EF4444">时间到！</div>
    <div class="overlay-sub" id="fail-sub"></div>
    <div class="fail-answers" id="fail-answers"></div>
    <div class="ov-btns">
      <button class="ov-btn secondary" id="btn-fail-menu">关卡选择</button>
      <button class="ov-btn primary"   id="btn-fail-retry">重试</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 关卡数据
// ══════════════════════════════════════
const RADICAL_MAP = {

         "天":null,"月":null,"木":null,"马":null,"土":null,
         "方":null,"石":null,"心":null,"日":null,"山":null,
         "目":null,"青":null,"少":null,"才":null,"也":null},
};

const RADICAL_STYLE = {
  "氵":{accent:"#3B82F6",targetBg:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"#93C5FD"},
  "木":{accent:"#16A34A",targetBg:"linear-gradient(135deg,#16A34A,#15803D)",border:"#86EFAC"},
  "口":{accent:"#7C3AED",targetBg:"linear-gradient(135deg,#7C3AED,#6D28D9)",border:"#C4B5FD"},
  "土":{accent:"#D97706",targetBg:"linear-gradient(135deg,#D97706,#B45309)",border:"#FCD34D"},
  "日":{accent:"#EA580C",targetBg:"linear-gradient(135deg,#EA580C,#C2410C)",border:"#FED7AA"},
  "忄":{accent:"#DB2777",targetBg:"linear-gradient(135deg,#DB2777,#BE185D)",border:"#F9A8D4"},
  "火":{accent:"#EF4444",targetBg:"linear-gradient(135deg,#EF4444,#DC2626)",border:"#FCA5A5"},
  "亻":{accent:"#0891B2",targetBg:"linear-gradient(135deg,#0891B2,#0E7490)",border:"#67E8F9"},
  "钅":{accent:"#B45309",targetBg:"linear-gradient(135deg,#D97706,#92400E)",border:"#FDE68A"},
};

const LEVELS = [
  {id:"1-1",radical:"氵",radName:"水字旁",target:6,time:90,
   pool:["青","可","胡","木","曰","少","方","天","心","日","土","石","月","马","目","口","斥","才","生","乔","鸟","成","也","牛","山"]},
  {id:"1-2",radical:"木",radName:"木字旁",target:5,time:90,
   pool:["目","木","口","乔","奉","天","石","土","心","日","马","月","青","方","也","斥","鸟","少","才","成","牛","山","匀","寸","亡"]},
  {id:"1-3",radical:"口",radName:"口字旁",target:5,time:90,
   pool:["天","鸟","斥","马","牛","月","木","土","石","山","青","日","心","方","目","少","成","才","乔","也","匀","寸","亡","丁","胡"]},
  {id:"1-4",radical:"土",radName:"土字旁",target:5,time:90,
   pool:["也","方","才","成","匀","月","天","心","青","马","木","日","石","山","目","斥","鸟","少","乔","牛","胡","寸","亡","京","夬"]},
  {id:"1-5",radical:"日",radName:"日字旁",target:5,time:90,
   pool:["月","青","寸","生","京","土","心","木","天","马","方","石","山","目","也","才","斥","鸟","少","成","匀","胡","亡","乔","牛"]},
  {id:"1-6",radical:"忄",radName:"心字旁",target:5,time:85,
   pool:["青","亡","生","各","夬","天","月","木","土","马","方","石","心","日","目","才","也","成","乔","牛","胡","寸","鸟","少","匀"]},
  {id:"1-7",radical:"火",radName:"火字旁",target:5,time:85,
   pool:["丁","少","因","户","包","山","天","土","马","月","木","石","心","日","方","目","才","青","也","成","胡","寸","鸟","匀","乔"]},
  {id:"1-8",radical:"亻",radName:"人字旁",target:5,time:85,
   pool:["木","门","立","尔","也","天","月","土","马","心","方","石","日","山","目","青","少","才","乔","成","胡","寸","鸟","匀","牛"]},
  {id:"1-9",radical:"钅",radName:"金字旁",target:5,time:85,
   pool:["叉","同","艮","冈","者","天","月","木","马","土","方","石","心","日","山","目","青","少","才","也","胡","寸","鸟","匀","成"]},
];

// ══════════════════════════════════════
// 常量 & 状态（全部在顶层声明，避免 ReferenceError）
// ══════════════════════════════════════
const BLOCK_W  = 56;
const BLOCK_H  = 56;
const BRD_PAD  = 6;   // 方块离方框边缘的最小距离

let currentLevel    = null;
let currentLevelIdx = 0;
let blockData       = [];
let foundCount      = 0;
let errorCount      = 0;
let timeLeft        = 0;
let totalTime       = 0;
let timerInterval   = null;
let gameOver        = false;
let resultSlots     = [];

// ══════════════════════════════════════
// 存档
// ══════════════════════════════════════
function saveStars(id, stars) {
  const d = JSON.parse(localStorage.getItem("hzpuzzle") || "{}");
  if ((d[id]||0) < stars) d[id] = stars;
  localStorage.setItem("hzpuzzle", JSON.stringify(d));
}
function getStars(id) {
  return JSON.parse(localStorage.getItem("hzpuzzle") || "{}")[id] || 0;
}

// ══════════════════════════════════════
// 音效
// ══════════════════════════════════════
let _actx = null;
function actx() {
  if (!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function tone(f1,f2,dur,type="sine",vol=0.22){
  try{
    const c=actx(),o=c.createOscillator(),g=c.createGain();
    o.type=type; o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(f1,c.currentTime);
    if(f2!==f1) o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+dur);
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur+0.04);
    o.start(c.currentTime); o.stop(c.currentTime+dur+0.05);
  }catch(e){}
}
const sfxOK   = ()=>tone(440,880,0.14);
const sfxBad  = ()=>tone(200,100,0.2,"sawtooth",0.14);
const sfxWin  = ()=>[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,f,0.18),i*200));
const sfxFail = ()=>tone(300,100,0.45);
const sfxTick = ()=>tone(900,900,0.06,"sine",0.08);

// ══════════════════════════════════════
// 工具
// ══════════════════════════════════════
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
}

// ══════════════════════════════════════
// 关卡选择
// ══════════════════════════════════════
function renderMenu(){
  const grid=document.getElementById("level-grid");
  grid.innerHTML="";
  LEVELS.forEach((lv,idx)=>{
    const st=getStars(lv.id);
    const s=RADICAL_STYLE[lv.radical];
    const btn=document.createElement("div");
    btn.className="level-btn";
    btn.innerHTML=`
      <div class="lnum">第 ${lv.id} 关</div>
      <div class="lrad" style="color:${s.accent}">${lv.radical}</div>
      <div class="lname">${lv.radName}</div>
      <div class="stars">${"★".repeat(st)}${"☆".repeat(3-st)}</div>`;
    btn.addEventListener("click",()=>startLevel(idx));
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════
// 启动关卡
// ══════════════════════════════════════
function startLevel(idx){
  currentLevelIdx=idx;
  currentLevel=LEVELS[idx];
  foundCount=0; errorCount=0; gameOver=false;
  blockData=[];

  document.getElementById("screen-menu").style.display="none";
  document.getElementById("screen-game").classList.add("active");

  // 配色
  const s=RADICAL_STYLE[currentLevel.radical];
  document.getElementById("target-block").style.background=s.targetBg;
  document.getElementById("target-block").style.color="#fff";
  document.getElementById("timer-bar").style.background=s.targetBg;
  document.getElementById("board").style.borderColor=s.border;

  document.getElementById("level-label").textContent=`第 ${currentLevel.id} 关`;
  document.getElementById("target-char").textContent=currentLevel.radical;
  document.getElementById("target-name").textContent=currentLevel.radName;

  // 结果格子
  const rr=document.getElementById("result-row");
  rr.innerHTML=""; resultSlots=[];
  for(let i=0;i<currentLevel.target;i++){
    const sl=document.createElement("div");
    sl.className="result-slot";
    rr.appendChild(sl); resultSlots.push(sl);
  }
  updateFoundLabel();

  // 计时
  clearInterval(timerInterval);
  timeLeft=currentLevel.time; totalTime=currentLevel.time;
  updateTimerBar();

  // 等 DOM 完成渲染后再测量 board 尺寸
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    buildBlocks();
    startTimer();
  }));
}

// ══════════════════════════════════════
// 生成方块
// ══════════════════════════════════════
function buildBlocks(){
  const board    = document.getElementById("board");
  const brdWrap  = document.getElementById("board-wrap");
  board.innerHTML="";
  blockData=[];

  // 方框固定尺寸：宽度贴合屏幕（减去左右各8px margin），高度固定240px
  const wrapW = brdWrap.clientWidth  || window.innerWidth;
  const BW    = Math.max(240, wrapW - 16);   // board 宽
  const BH    = 240;                          // board 高（固定，不随屏幕变大）
  board.style.position = "relative";
  board.style.width    = BW + "px";
  board.style.height   = BH + "px";
  // 取消 absolute 撑满，改为手动设置宽高，board-wrap 用 flex 居中
  board.style.top=""; board.style.left=""; board.style.right=""; board.style.bottom="";

  if(BW<10||BH<10){
    setTimeout(buildBlocks,100); return;
  }

  const pool=[...currentLevel.pool];
  shuffle(pool);

  // 纯随机撒点（不用网格），分 4 层
  // 每层独立随机，层号高的 z-index 更大（在上面）
  const LAYERS = 4;
  const PER_LAYER = Math.ceil(pool.length / LAYERS);

  const positions=[];
  for(let layer=0;layer<LAYERS;layer++){
    const count = layer < LAYERS-1 ? PER_LAYER : pool.length - PER_LAYER*(LAYERS-1);
    for(let k=0;k<count;k++){
      positions.push({
        x: rnd(BRD_PAD, BW - BLOCK_W - BRD_PAD),
        y: rnd(BRD_PAD, BH - BLOCK_H - BRD_PAD),
        layer
      });
    }
  }

  // 按 layer 排序（低层先插入 DOM，z-index 低）
  positions.sort((a,b)=>a.layer-b.layer);

  positions.forEach((pos,i)=>{
    const radical=pool[i % pool.length];
    const isCorrect=!!RADICAL_MAP[currentLevel.radical][radical];
    const zIdx=10+pos.layer*6+rnd(0,5);

    const el=document.createElement("div");
    el.className="block";
    el.style.left  =pos.x+"px";
    el.style.top   =(-BLOCK_H-20)+"px";   // 初始位置在方框外顶部
    el.style.zIndex=zIdx;
    el.style.transition=`top .4s cubic-bezier(.22,.61,.36,1) ${i*25}ms`;
    el.textContent=radical;

    const bidx=blockData.length;
    el.addEventListener("click",e=>{e.stopPropagation();handleClick(bidx);});
    board.appendChild(el);

    blockData.push({
      el, x:pos.x, y:pos.y,
      w:BLOCK_W, h:BLOCK_H,
      zIndex:zIdx,
      radical, isCorrect,
      isClickable:true, removed:false
    });

    // 触发飘落（双帧延迟确保 transition 生效）
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.top=pos.y+"px";
    }));
  });

  // 全部落地后计算遮挡
  const landDelay=pool.length*25+500;
  setTimeout(updateClickability, landDelay);
}

// ══════════════════════════════════════
// 遮挡计算（像素采样联合覆盖，避免重复计数）
// ══════════════════════════════════════
function coveredRatio(target, covers){
  if(!covers.length) return 0;
  const STEP=8;
  let total=0, hit=0;
  for(let py=target.y+STEP/2; py<target.y+target.h; py+=STEP){
    for(let px=target.x+STEP/2; px<target.x+target.w; px+=STEP){
      total++;
      for(const c of covers){
        if(px>=c.x&&px<c.x+c.w&&py>=c.y&&py<c.y+c.h){hit++;break;}
      }
    }
  }
  return hit/total;
}

function updateClickability(){
  // 先从 DOM 同步最新 top（飘落结束后）
  blockData.forEach(bd=>{
    if(bd.removed) return;
    const t=parseFloat(bd.el.style.top);
    if(!isNaN(t)) bd.y=t;
  });
  blockData.forEach((bd,i)=>{
    if(bd.removed) return;
    const uppers=blockData.filter((_,j)=>j!==i&&!blockData[j].removed&&blockData[j].zIndex>bd.zIndex);
    const r=coveredRatio(bd,uppers);
    bd.isClickable=(r<0.7);
    bd.el.classList.toggle("disabled",!bd.isClickable);
  });
}

// ══════════════════════════════════════
// 点击处理
// ══════════════════════════════════════
function handleClick(bidx){
  const bd=blockData[bidx];
  if(!bd||bd.removed||!bd.isClickable||gameOver) return;
  bd.isCorrect ? doCorrect(bd) : doWrong(bd);
}

function doCorrect(bd){
  sfxOK();
  bd.removed=true;
  bd.el.classList.add("anim-correct");
  bd.el.style.pointerEvents="none";
  const hanzi=RADICAL_MAP[currentLevel.radical][bd.radical];
  setTimeout(()=>{
    if(bd.el.parentNode) bd.el.parentNode.removeChild(bd.el);
    updateClickability();
    const slot=resultSlots[foundCount];
    if(slot){
      slot.textContent=hanzi;
      slot.classList.add("filled");
      void slot.offsetWidth;
      slot.classList.add("pop");
      setTimeout(()=>slot.classList.remove("pop"),350);
    }
    foundCount++;
    updateFoundLabel();
    if(foundCount>=currentLevel.target) setTimeout(triggerWin,300);
  },420);
}

function doWrong(bd){
  sfxBad();
  errorCount++;
  timeLeft=Math.max(0,timeLeft-5);
  updateTimerBar();

  const bar=document.getElementById("timer-bar");
  bar.style.transition="none";
  bar.style.background="#EF4444";
  setTimeout(()=>{bar.style.transition="";updateTimerBar();},450);

  bd.el.classList.add("anim-wrong");
  bd.el.style.pointerEvents="none";
  setTimeout(()=>{
    bd.el.classList.remove("anim-wrong");
    bd.el.style.pointerEvents="";
    bd.el.style.background="";
    bd.el.style.borderColor="";
  },380);
}

function updateFoundLabel(){
  document.getElementById("found-label").textContent=
    `已找到 ${foundCount} / ${currentLevel.target}`;
}

// ══════════════════════════════════════
// 计时器
// ══════════════════════════════════════
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gameOver){clearInterval(timerInterval);return;}
    timeLeft--;
    if(timeLeft<=15) sfxTick();
    updateTimerBar();
    if(timeLeft<=0){clearInterval(timerInterval);triggerFail();}
  },1000);
}

function updateTimerBar(){
  const pct=Math.max(0,timeLeft/totalTime)*100;
  const bar=document.getElementById("timer-bar");
  bar.style.width=pct+"%";
  const m=Math.floor(timeLeft/60), s=timeLeft%60;
  document.getElementById("timer-text").textContent=
    `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  if(timeLeft<=15) bar.style.background="#EF4444";
  else if(timeLeft<=totalTime*0.4) bar.style.background="#F59E0B";
}

// ══════════════════════════════════════
// 通关 / 失败
// ══════════════════════════════════════
function calcStars(){
  if(errorCount===0&&timeLeft/totalTime>0.5) return 3;
  if(errorCount<=2&&timeLeft>0)             return 2;
  return 1;
}

function triggerWin(){
  if(gameOver) return;
  gameOver=true; clearInterval(timerInterval); sfxWin();
  const stars=calcStars();
  saveStars(currentLevel.id,stars);
  document.getElementById("win-stars").textContent="★".repeat(stars)+"☆".repeat(3-stars);
  document.getElementById("win-sub").textContent=`错误 ${errorCount} 次，剩余 ${timeLeft} 秒`;
  document.getElementById("btn-win-next").style.display=
    currentLevelIdx<LEVELS.length-1?"":"none";
  showOv("overlay-win");
}

function triggerFail(){
  if(gameOver) return;
  gameOver=true; sfxFail();
  document.getElementById("fail-sub").textContent=
    `已找到 ${foundCount} / ${currentLevel.target} 个`;
  const radMap=RADICAL_MAP[currentLevel.radical];
  const ans=Object.entries(radMap)
    .filter(([,v])=>v!==null)
    .map(([k,v])=>`${currentLevel.radical} + ${k} = ${v}`)
    .join("\n");
  document.getElementById("fail-answers").textContent="正确答案：\n"+ans;
  showOv("overlay-fail");
}

function showOv(id){document.getElementById(id).classList.add("show");}
function hideOv(id){document.getElementById(id).classList.remove("show");}

function goMenu(){
  clearInterval(timerInterval);
  hideOv("overlay-win"); hideOv("overlay-fail");
  document.getElementById("screen-game").classList.remove("active");
  document.getElementById("screen-menu").style.display="";
  renderMenu();
}

document.getElementById("btn-back").addEventListener("click",goMenu);
document.getElementById("btn-win-menu").addEventListener("click",goMenu);
document.getElementById("btn-fail-menu").addEventListener("click",goMenu);
document.getElementById("btn-win-next").addEventListener("click",()=>{
  hideOv("overlay-win"); startLevel(currentLevelIdx+1);
});
document.getElementById("btn-fail-retry").addEventListener("click",()=>{
  hideOv("overlay-fail"); startLevel(currentLevelIdx);
});

renderMenu();
</script>
</body>
